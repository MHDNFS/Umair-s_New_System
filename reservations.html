<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoomBooking - My Reservations</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome CSS this link i got from fontawesome offical website da -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: var(--bs-tertiary-bg); }
        .booking-card { max-width: 600px; margin: 40px auto; background-color: var(--bs-body-bg); padding: 30px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<!--  Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm border-bottom" style="background-color: #0a2540;">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html"><i class="fa-solid fa-hotel me-2"></i>Grand Horizon</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="rooms.html">Our Rooms</a></li>
                <li class="nav-item"><a class="nav-link active" href="reservations.html">My Reservations</a></li>
                <li class="nav-item"><a class="nav-link" href="contact.html">Contact Us</a></li>
            </ul>
            <button class="btn text-white ms-lg-3 mt-2 mt-lg-0 border-0 fs-5" id="themeToggle" style="background: transparent;" type="button" title="Toggle Dark Mode">
                <i class="fa-solid fa-moon"></i>
            </button>
        </div>
    </div>
</nav>

<!-- Content -->
<div class="container mt-5">
    <h2 class="text-center fw-bold mb-4">Manage Your Reservation</h2>

    <!-- Lookup Form -->
    <div class="booking-card" id="lookupFormContainer">
        <p class="text-center text-muted mb-4">Enter your details below to view, modify, or cancel your booking.</p>
        <form id="lookupForm">
            <div class="mb-3">
                <label class="form-label fw-bold">Booking Reference ID</label>
                <input type="text" class="form-control" placeholder="e.g. RB-12345" required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold">Email Address</label>
                <input type="email" class="form-control" placeholder="Enter the email used for booking" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Find Reservation</button>
        </form>
    </div>

    <!-- Booking Details (Hidden by default) -->
    <div class="booking-card d-none" id="bookingDetailsContainer">
        <div class="d-flex justify-content-between align-items-center border-bottom pb-3 mb-3">
            <h4 class="fw-bold mb-0">Booking #RB-12345</h4>
            <span class="badge bg-success">Confirmed</span>
        </div>
        
        <div class="row mb-3">
            <div class="col-6">
                <p class="text-muted mb-1 small">Check-in Date</p>
                <h6 class="fw-bold">Oct 15, 2026</h6>
            </div>
            <div class="col-6">
                <p class="text-muted mb-1 small">Check-out Date</p>
                <h6 class="fw-bold">Oct 18, 2026</h6>
            </div>
        </div>
        
        <div class="row mb-4">
            <div class="col-6">
                <p class="text-muted mb-1 small">Room Type</p>
                <h6 class="fw-bold">Luxury Suite</h6>
            </div>
            <div class="col-6">
                <p class="text-muted mb-1 small">Guests</p>
                <h6 class="fw-bold">2 Adults</h6>
            </div>
        </div>
        
        <div class="d-flex gap-2">
            <button class="btn btn-outline-primary w-50 fw-bold" onclick="alert('Modification tools would open here.')">Modify</button>
            <button class="btn btn-outline-danger w-50 fw-bold" onclick="cancelBooking()">Cancel</button>
        </div>
        <button class="btn btn-link w-100 text-muted mt-3 text-decoration-none" onclick="goBack()">← Back to Search</button>
    </div>
</div>

<!-- JS -->
<script>
    document.getElementById('lookupForm').addEventListener('submit', function(e) {
        e.preventDefault();
        // Simulate a tiny delay for loading
        const btn = this.querySelector('button');
        const oldText = btn.innerText;
        btn.innerText = 'Searching...';
        btn.disabled = true;

        setTimeout(() => {
            document.getElementById('lookupFormContainer').classList.add('d-none');
            document.getElementById('bookingDetailsContainer').classList.remove('d-none');
            
            btn.innerText = oldText;
            btn.disabled = false;
        }, 800);
    });

    function goBack() {
        document.getElementById('bookingDetailsContainer').classList.add('d-none');
        document.getElementById('lookupFormContainer').classList.remove('d-none');
        document.getElementById('lookupForm').reset();
    }

    function cancelBooking() {
        if(confirm("Are you sure you want to cancel this booking? This action cannot be undone.")) {
            alert("Your booking has been cancelled successfully. A confirmation email has been sent.");
            goBack();
        }
    }
</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Dark Mode Logic -->
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const toggleBtn = document.getElementById('themeToggle');
        if (!toggleBtn) return;
        const icon = toggleBtn.querySelector('i');
        
        const currentTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', currentTheme);
        updateIcon(currentTheme);

        toggleBtn.addEventListener('click', () => {
            const newTheme = document.documentElement.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-bs-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateIcon(newTheme);
        });

        function updateIcon(theme) {
            if (theme === 'dark') {
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
            } else {
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
            }
        }
    });
</script>

</body>
</html>
