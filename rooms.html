<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Booking System</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        /* Smaller Card */
        .room-card {
            max-width: 260px;
            margin: auto;
        }

        .room-card img {
            height: 130px;
            object-fit: cover;
        }

        .card-body {
            padding: 8px;
        }

        .card-title {
            font-size: 15px;
            margin-bottom: 4px;
        }

        .card-text {
            font-size: 13px;
            margin-bottom: 4px;
        }

        .card p {
            font-size: 13px;
        }

        .btn {
            padding: 5px;
            font-size: 13px;
        }
    </style>
</head>
<body>

<!--  Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">RoomBooking</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link active" href="#">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Rooms</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Bookings</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Header -->
<div class="container mt-4">
    <h2 class="text-center mb-4">Available Rooms</h2>

    <div class="row" id="roomContainer">
        <!-- Rooms inserted by JS -->
    </div>
</div>

<!-- JS -->
<script>

    const rooms = [
    {name: "Suite Room", price: 100, desc: "Luxury, King Bed", img: "assets/images/room8.jpg"},
    {name: "Deluxe Room", price: 50, desc: "AC, WiFi, TV, 2 Beds", img: "assets/images/room2.jpg"},
    {name: "Family Room", price: 70, desc: "AC, 3 Beds", img: "assets/images/room11.jpg"},
    {name: "Standard Room", price: 30, desc: "Fan, WiFi, 1 Bed", img: "assets/images/room5.jpg"},

    {name: "Family Room", price: 70, desc: "AC, 3 Beds", img: "assets/images/room11.jpg"},

    {name: "Family Room", price: 70, desc: "AC, 3 Beds", img: "assets/images/room11.jpg"},
];

    const container = document.getElementById("roomContainer");

    rooms.forEach(room => {
        container.innerHTML += `
            <div class="col-md-3 mb-3">
                <div class="card room-card shadow">
                    <img src="${room.img}" class="card-img-top" alt="Room">
                    <div class="card-body">
                        <h5 class="card-title">${room.name}</h5>
                        <p class="card-text">${room.desc}</p>
                        <p><strong>$${room.price} / night</strong></p>
                        <button class="btn btn-primary w-100" onclick="bookRoom('${room.name}')">
                            Book Now
                        </button>
                    </div>
                </div>
            </div>
        `;
    });

    function bookRoom(roomName) {
        alert("You selected: " + roomName);
    }

</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
